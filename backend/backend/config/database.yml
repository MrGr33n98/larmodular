# PostgreSQL. Versions 3.8.0 and up are supported.
#   gem install pg
#
#   Ensure the PostgreSQL gem is defined in your Gemfile
#   gem "pg"

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME", ENV.fetch("POSTGRES_USER", "postgres")) %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", ENV.fetch("POSTGRES_PASSWORD", "postgres")) %>
  host: <%= ENV.fetch("DATABASE_HOST", ENV.fetch("POSTGRES_HOST", "127.0.0.1")) %>

development:
  <<: *default
  database: larmodular_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: larmodular_test

production:
  <<: *default
  database: larmodular_production
  username: <%= ENV.fetch("DATABASE_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "postgres" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>

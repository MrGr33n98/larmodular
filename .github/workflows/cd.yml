name: CD - Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

env:
  RUBY_VERSION: '3.2.2'
  NODE_VERSION: '20'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and Push Docker Images
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployed-images.txt
        run: |
          echo "${{ steps.meta-backend.outputs.tags }}" > deployed-images.txt
          echo "${{ steps.meta-frontend.outputs.tags }}" >> deployed-images.txt

      - name: Upload deployed images info
        uses: actions/upload-artifact@v4
        with:
          name: deployed-images
          path: deployed-images.txt
          retention-days: 1

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.larmodular.com.br
    
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Download deployed images info
        uses: actions/download-artifact@v4
        with:
          name: deployed-images

      - name: Read image tags
        id: images
        run: |
          BACKEND_IMAGE=$(sed -n '1p' deployed-images.txt)
          FRONTEND_IMAGE=$(sed -n '2p' deployed-images.txt)
          echo "backend-image=$BACKEND_IMAGE" >> $GITHUB_OUTPUT
          echo "frontend-image=$FRONTEND_IMAGE" >> $GITHUB_OUTPUT

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.test.conf"
          target: "/home/ubuntu/larmodular/"
          overwrite: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/larmodular
            
            # Set environment variables
            export BACKEND_IMAGE="${{ steps.images.outputs.backend-image }}"
            export FRONTEND_IMAGE="${{ steps.images.outputs.frontend-image }}"
            
            # Create .env file
            cat > .env << EOF
            BACKEND_IMAGE=$BACKEND_IMAGE
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=larmodular_production
            SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            REDIS_URL=redis://redis:6379
            NEXT_PUBLIC_API_URL=https://staging.larmodular.com.br
            EOF
            
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Pull and restart containers
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            
            # Run migrations
            docker-compose -f docker-compose.prod.yml exec -T backend bundle exec rails db:migrate || true


  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment:
      name: production
      url: https://larmodular.com.br
    
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Download deployed images info
        uses: actions/download-artifact@v4
        with:
          name: deployed-images

      - name: Read image tags
        id: images
        run: |
          BACKEND_IMAGE=$(sed -n '1p' deployed-images.txt)
          FRONTEND_IMAGE=$(sed -n '2p' deployed-images.txt)
          echo "backend-image=$BACKEND_IMAGE" >> $GITHUB_OUTPUT
          echo "frontend-image=$FRONTEND_IMAGE" >> $GITHUB_OUTPUT

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_PRODUCTION }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.test.conf"
          target: "/home/ubuntu/larmodular/"
          overwrite: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST_PRODUCTION }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/larmodular
            
            # Set environment variables
            export BACKEND_IMAGE="${{ steps.images.outputs.backend-image }}"
            export FRONTEND_IMAGE="${{ steps.images.outputs.frontend-image }}"
            
            # Create .env file
            cat > .env << EOF
            BACKEND_IMAGE=$BACKEND_IMAGE
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=larmodular_production
            SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            REDIS_URL=redis://redis:6379
            NEXT_PUBLIC_API_URL=https://larmodular.com.br
            EOF
            
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Pull and restart containers
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            
            # Run migrations
            docker-compose -f docker-compose.prod.yml exec -T backend bundle exec rails db:migrate || true


  # Post-deployment Tests
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Add your smoke test commands here
